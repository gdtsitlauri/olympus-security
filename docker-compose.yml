version: '3.9'

services:
  # ── OLYMPUS API server ────────────────────────────────────────────────────
  olympus-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: olympus-security:latest
    container_name: olympus-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - OLYMPUS_GPU=0          # set to 1 if NVIDIA runtime available
      - OLYMPUS_API_PORT=8000
      - OLYMPUS_DASHBOARD_PORT=8501
    command: python -m uvicorn olympus.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - olympus-net

  # ── OLYMPUS Dashboard ─────────────────────────────────────────────────────
  olympus-dashboard:
    image: olympus-security:latest
    container_name: olympus-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - OLYMPUS_GPU=0
    command: streamlit run olympus/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - olympus-api
    restart: unless-stopped
    networks:
      - olympus-net

  # ── Sandbox (isolated execution environment) ──────────────────────────────
  olympus-sandbox:
    image: ubuntu:22.04
    container_name: olympus-sandbox
    network_mode: none          # fully isolated — no network access
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "1.0"
    restart: "no"
    profiles:
      - sandbox                 # only start when explicitly requested

networks:
  olympus-net:
    driver: bridge

volumes:
  olympus-data:
  olympus-results:
